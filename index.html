<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Kyron Apply</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
    background: url("images.jpeg") no-repeat center center fixed;
    background-size: cover;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
  }


.container{
background:#161b22;
padding:30px;
width:90%;
max-width:450px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,191,255,.3);
}

h1{
text-align:center;
color:#00bfff;
margin-bottom:10px;
}

p{
text-align:center;
color:#bdbdbd;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin-bottom:15px;
background:#0d1117;
color:white;
border:1px solid #30363d;
border-radius:8px;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#00bfff;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0099cc;
}

#success{
display:none;
text-align:center;
}

#success h2{
color:#00ff88;
margin-bottom:10px;
}

.discord-btn{
display:inline-block;
margin-top:15px;
padding:12px 20px;
background:#5865F2;
color:white;
text-decoration:none;
border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<div id="form">

<h1>Team Zyron</h1>
<p>Apply to Join Our Team</p>

<form id="applicationForm">

<select name="role" required>
<option value="">Select Role</option>
<option>Pvper</option>
<option>Grinder</option>
<option>Allrounder</option>
</select>
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

    <button type="submit">Submit Application</button>

</form>

</div>

<div id="success">

<h2>✅ Application Submitted!</h2>

<p>Your application has been submitted successfully.</p>

<a class="discord-btn" href="https://discord.gg/wEtCZ7DdsF" target="_blank">
Join Team Kyron Discord
</a>

</div>

</div>

<script>
const form = document.getElementById("applicationForm");
const message = document.getElementById("message");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = new FormData(form);

  await fetch("https://eoo397bj8mc6wnt.m.pipedream.net/", {
    method: "POST",
    body: data
  });

  message.innerHTML = "✅ Application Submitted Successfully!";
  message.style.color = "lime";
  form.reset();
});
</script>

</body>
  </html>
